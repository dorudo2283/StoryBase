<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Code Editor - Real File Sync</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs/loader.min.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: #1e1e1e; color: #ffffff;
            font-family: 'Courier New', Courier, monospace; overflow: hidden;
        }
        .app-container { display: flex; height: 100vh; flex-direction: column; }
        .header {
            height: 40px; background-color: #111;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; border-bottom: 1px solid #2d2d2d; font-size: 14px;
        }
        .logo { font-weight: bold; font-size: 16px; }
        .save-status { color: #e5c07b; }
        .breadcrumbs { color: #888; }
        .breadcrumbs span { color: #fff; font-weight: bold; }

        .main-content { display: flex; flex: 1; }
        .sidebar { width: 240px; background-color: #333333; display: flex; border-right: 1px solid #2d2d2d; }
        .sidebar-actions {
            width: 60px; background-color: #252526;
            display: flex; flex-direction: column; align-items: center; padding-top: 15px;
        }
        .action-btn { position: relative; text-align: center; font-size: 12px; color: #ccc; }
        .badge {
            position: absolute; top: -5px; right: -10px;
            background-color: #e06c75; color: white; border-radius: 10px;
            padding: 2px 6px; font-size: 11px; font-weight: bold; display: none;
        }
        .file-tree { flex: 1; padding: 15px 10px; font-size: 13px; overflow-y: auto; }
        
        /* フォルダを開くスタイリッシュなボタン */
        .open-btn {
            width: 100%; background-color: #4c6ef5; color: white;
            border: none; padding: 8px 12px; border-radius: 4px;
            cursor: pointer; font-weight: bold; margin-bottom: 15px;
            font-size: 12px; text-align: center;
        }
        .open-btn:hover { background-color: #3b5bdb; }

        .file-item { padding: 6px 8px; cursor: pointer; display: flex; align-items: center; border-radius: 3px; margin-bottom: 2px; color: #ccc; }
        .file-item:hover { background-color: #444; color: #fff; }
        .file-item.active { background-color: #2a2d2e; color: #61afef; }
        .file-item.js-file { color: #e5c07b; }
        .file-item.unsaved::after { content: "●"; color: #e5c07b; font-size: 9px; margin-left: auto; padding-right: 5px; }
        .editor-container { flex: 1; position: relative; background-color: #1e1e1e; }
        #monaco-root { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <div class="logo">ロゴ</div>
            <div class="save-status" id="saveStatus">Saved</div>
            <div class="breadcrumbs" id="breadcrumbs">ファイルを読み込んでください</div>
        </div>

        <div class="main-content">
            <div class="sidebar">
                <div class="sidebar-actions">
                    <div class="action-btn">
                        <span style="font-size: 28px;">📄</span>
                        <div class="badge" id="unsavedCountBadge">0</div>
                        <div style="margin-top: 3px;">Save</div>
                    </div>
                </div>
                
                <div class="file-tree">
                    <button class="open-btn" onclick="openLocalFolder()">📁 フォルダを開く</button>
                    <div id="fileList"></div>
                </div>
            </div>

            <div class="editor-container">
                <div id="monaco-root"></div>
            </div>
        </div>
    </div>

    <script>
        // 仮想ファイルシステム（本物のファイルへアクセスするための「ハンドル」も一緒に保管する）
        let filesStorage = {};
        let currentFileKey = "";
        let editorInstance = null;

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            editorInstance = monaco.editor.create(document.getElementById('monaco-root'), {
                value: "// 「フォルダを開く」ボタンから、パソコンの作業フォルダを選択してください。",
                language: 'javascript',
                theme: 'vs-dark',
                fontSize: 15,
                automaticLayout: true
            });

            editorInstance.onDidChangeModelContent(() => {
                if (currentFileKey && filesStorage[currentFileKey]) {
                    filesStorage[currentFileKey].content = editorInstance.getValue();
                    if (filesStorage[currentFileKey].isSaved) {
                        filesStorage[currentFileKey].isSaved = false;
                        const item = document.getElementById(`file-${btoa(currentFileKey)}`);
                        if (item) item.classList.add('unsaved');
                        updateGlobalStatus();
                    }
                }
            });
        });

        // パソコン内の本物のフォルダを選択させる関数
        async function openLocalFolder() {
            try {
                // ブラウザにフォルダ選択ダイアログを表示させる（File System Access API）
                const folderHandle = await window.showDirectoryPicker();
                filesStorage = {}; // 初期化
                
                // フォルダ内のファイルを再帰的にスキャン
                await readDirectory(folderHandle, folderHandle.name);
                
                // 最初のファイルを開く
                const firstKey = Object.keys(filesStorage)[0];
                if (firstKey) {
                    switchFile(firstKey);
                }
            } catch (err) {
                console.error("フォルダの変更権限が拒否されたか、キャンセルされました:", err);
            }
        }

        // フォルダ内部を走査してファイルをメモリに格納する
        async function readDirectory(dirHandle, currentPath) {
            for await (const entry of dirHandle.values()) {
                if (entry.kind === 'file') {
                    const file = await entry.getFile();
                    const text = await file.text();
                    const ext = entry.name.split('.').pop();
                    
                    let lang = 'javascript';
                    if (ext === 'html' || ext === 'htm') lang = 'html';
                    if (ext === 'css') lang = 'css';
                    if (ext === 'json') lang = 'json';

                    const fullPath = `${currentPath}/${entry.name}`;

                    // ファイルデータと一緒に「本物のファイルオブジェクト(handle)」を記憶させておく
                    filesStorage[fullPath] = {
                        name: entry.name,
                        path: fullPath,
                        content: text,
                        language: lang,
                        isSaved: true,
                        fileHandle: entry // ★これが上書き保存の「鍵」になります
                    };
                } else if (entry.kind === 'directory') {
                    // サブフォルダがあればさらに深く入る
                    await readDirectory(entry, `${currentPath}/${entry.name}`);
                }
            }
            renderFileList();
            updateGlobalStatus();
        }

        function updateGlobalStatus() {
            let unsavedCount = 0;
            for (let key in filesStorage) {
                if (!filesStorage[key].isSaved) unsavedCount++;
            }
            const badge = document.getElementById('unsavedCountBadge');
            if (unsavedCount > 0) {
                badge.innerText = unsavedCount;
                badge.style.display = "block";
            } else {
                badge.style.display = "none";
            }
            const statusText = document.getElementById('saveStatus');
            if (currentFileKey && filesStorage[currentFileKey] && !filesStorage[currentFileKey].isSaved) {
                statusText.innerText = "Not Saved...";
                statusText.style.color = "#e5c07b";
            } else {
                statusText.innerText = "Saved";
                statusText.style.color = "#98c379";
            }
        }

        function updateBreadcrumbs(filePath) {
            const breadcrumbsContainer = document.getElementById('breadcrumbs');
            const parts = filePath.split('/');
            const fileName = parts.pop();
            const folderPath = parts.join(' > ');
            breadcrumbsContainer.innerHTML = `${folderPath} > <span>${fileName}</span>`;
        }

        function renderFileList() {
            const fileList = document.getElementById('fileList');
            fileList.innerHTML = '';
            for (let key in filesStorage) {
                const file = filesStorage[key];
                const item = document.createElement('div');
                item.id = `file-${btoa(key)}`;
                item.className = `file-item ${file.language === 'javascript' ? 'js-file' : ''}`;
                if (key === currentFileKey) item.classList.add('active');
                if (!file.isSaved) item.classList.add('unsaved');
                const icon = file.language === 'javascript' ? 'JS' : '<>';
                item.innerText = `${icon} ${file.name}`;
                item.onclick = () => switchFile(key);
                fileList.appendChild(item);
            }
        }

        function switchFile(key) {
            currentFileKey = key;
            const fileData = filesStorage[key];
            renderFileList();
            if (editorInstance) {
                editorInstance.setValue(fileData.content);
                monaco.editor.setModelLanguage(editorInstance.getModel(), fileData.language);
            }
            updateBreadcrumbs(fileData.path);
            updateGlobalStatus();
        }

        // --- ★本物のファイルへ上書き保存する処理 (Ctrl + S) ---
        window.addEventListener('keydown', async function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                
                const activeFile = filesStorage[currentFileKey];
                if (activeFile && activeFile.fileHandle) {
                    try {
                        // パソコン内の本物のファイルに書き込みストリームを開く
                        const writable = await activeFile.fileHandle.createWritable();
                        // エディタの現在の文字を書き込む
                        await writable.write(editorInstance.getValue());
                        // ファイルを閉じて保存を確定
                        await writable.close();

                        // 内部ステータスを「保存済み」に変更
                        activeFile.isSaved = true;
                        const item = document.getElementById(`file-${btoa(currentFileKey)}`);
                        if (item) item.classList.remove('unsaved');
                        
                        updateGlobalStatus();
                        console.log(`【PCのローカルファイルに完全上書き成功】: ${activeFile.path}`);
                    } catch (err) {
                        alert("ファイルの保存権限がありません、またはブラウザが対応していません。");
                        console.error(err);
                    }
                }
            }
        });
    </script>
</body>
</html>
