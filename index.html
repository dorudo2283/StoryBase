<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Base 〜 祝！WEB開設 〜</title>
    <style>
        /* 全体設計：視覚的認知の負荷を減らすリセット */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            background-color: #f9f9f9;
            color: #333;
        }

        /* ヘッダー領域 */
        header {
            background-color: #ff8e8e; /* 暖色系で歓迎ムードを演出 */
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #0d2c54;
        }
        .logo span { color: #2a7b4c; }
        .search-bar {
            display: flex;
            gap: 5px;
        }
        .search-bar input {
            padding: 5px 10px;
            width: 250px;
            border: 1px solid #ccc;
        }
        .search-bar button, .sort-btn {
            padding: 5px 15px;
            background-color: #fff;
            border: 1px solid #999;
            cursor: pointer;
        }

        /* お知らせバー */
        .news-bar {
            background-color: #ffe4e4;
            padding: 8px;
            text-align: center;
            font-size: 14px;
            border-bottom: 1px solid #ffcdcd;
        }

        /* カルーセル（スライダー）領域 */
        .carousel-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 30px auto;
            max-width: 1000px;
            gap: 20px;
        }
        .arrow {
            font-size: 30px;
            cursor: pointer;
            user-select: none;
            padding: 10px;
        }
        .side-box {
            width: 80px;
            height: 150px;
            border: 1px solid #ccc;
            background-color: #fff;
            opacity: 0.5;
        }
        .main-banner {
            flex: 1;
            border: 2px solid #333;
            background-color: #fff;
            text-align: center;
            padding: 30px 20px;
        }
        .banner-title {
            font-size: 28px;
            margin-bottom: 15px;
        }
        .banner-sub {
            background-color: #f7d6c8;
            padding: 10px;
            font-style: italic;
            font-weight: bold;
            color: #b84116;
        }

        /* メインコンテンツ（2カラムレイアウト） */
        .content-wrapper {
            display: flex;
            max-width: 1200px;
            margin: 0 auto;
            border: 1px solid #aaa;
            background-color: #fff;
        }
        .column {
            flex: 1;
            min-height: 400px;
        }
        .column:first-child {
            border-right: 1px solid #aaa;
        }
        .column-title {
            background-color: #ccc;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 0.3em;
        }
        .list-container {
            padding: 20px;
        }

        /* 小説アイテムのスタイル */
        .novel-item {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px dashed #eee;
        }
        .novel-title {
            color: #0066cc;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
        }
        .novel-title:hover {
            text-decoration: underline;
        }
        .novel-desc {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
            line-height: 1.4;
        }

        /* ランキングアイコンの簡易再現 */
        .rank-badge {
            color: #ffaa00;
            font-weight: bold;
            margin-right: 5px;
        }

        /* スクロール対応設定（登録した小説用） */
        .scrollable-list {
            max-height: 350px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">S<span>tory</span> B<span>ase</span> <span style="font-size: 14px; color:#333; font-weight:normal;">〜 祝！WEB開設 〜</span></div>
        <div class="search-bar">
            <input type="text" placeholder="作品名・作者で検索">
            <button>検索</button>
            <button class="sort-btn">並び替え▼</button>
        </div>
    </header>

    <div class="news-bar">
        お知らせ：タロウが作った小説WEBサイト、Story Baseを開設しました！オリジナルの小説作品を応募しています！
    </div>

    <div class="carousel-container">
        <div class="side-box"></div>
        <div class="arrow">←</div>
        <div class="main-banner">
            <div class="banner-title"><span class="logo">S<span>tory</span> B<span>ase</span></span> 開設しました！</div>
            <div class="banner-sub">オリジナル小説募集中！</div>
        </div>
        <div class="arrow">→</div>
        <div class="side-box"></div>
    </div>

    <div class="content-wrapper">
        <div class="column">
            <div class="column-title">新 着 順</div>
            <div class="list-container" id="recent-list">
                <div class="novel-item">
                    <span class="rank-badge">👑 1</span>
                    <a href="#" class="novel-title">絶望の翳し</a>
                    <p class="novel-desc">ある日、いつもの通りを歩いていたら急に人がぶつかってきて人生が入れ替わり！？</p>
                </div>
            </div>
        </div>

        <div class="column">
            <div class="column-title">登 録 し た 小 説</div>
            <div class="list-container scrollable-list" id="registered-list">
                <div class="novel-item">
                    <span class="rank-badge">1</span> <a href="#" class="novel-title">魔法の魔女</a>
                </div>
                <div class="novel-item">
                    <span class="rank-badge">2</span> <a href="#" class="novel-title">小説２</a>
                </div>
                <div class="novel-item">
                    <span class="rank-badge">3</span> <a href="#" class="novel-title">小説３</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
