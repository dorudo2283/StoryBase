<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Base 〜 祝！WEB開設 〜</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            background-color: #f9f9f9;
            color: #333;
        }

        /* ヘッダー */
        header {
            background-color: #ff8e8e;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo { font-size: 24px; font-weight: bold; color: #0d2c54; cursor: pointer; }
        .logo span { color: #2a7b4c; }
        
        /* 検索窓（クリアボタン「×」付き） */
        .search-area { display: flex; gap: 8px; align-items: center; }
        .search-input-wrapper { position: relative; display: inline-block; }
        .search-input-wrapper input {
            padding: 6px 30px 6px 12px;
            width: 250px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .clear-btn {
            position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
            border: none; background: none; color: #999; font-size: 16px; cursor: pointer; display: none;
        }
        .clear-btn:hover { color: #333; }

        .search-area button, .select-sort {
            padding: 6px 12px; background-color: #fff; border: 1px solid #999;
            border-radius: 4px; cursor: pointer; font-size: 14px;
        }

        /* お知らせバー */
        .news-bar {
            background-color: #ffe4e4; padding: 8px; text-align: center;
            font-size: 14px; border-bottom: 1px solid #ffcdcd;
        }

        /* カルーセル（スライダー枠） */
        .carousel-container {
            display: flex; align-items: center; justify-content: center;
            margin: 25px auto; max-width: 1000px; gap: 20px; padding: 0 20px;
        }
        .arrow { font-size: 30px; cursor: pointer; user-select: none; padding: 10px; }
        .side-box { width: 80px; height: 120px; border: 1px solid #ccc; background-color: #fff; opacity: 0.4; }
        .main-banner {
            flex: 1; border: 2px solid #333; background-color: #fff; text-align: center; padding: 25px 20px;
        }
        .banner-title { font-size: 26px; margin-bottom: 10px; }
        .banner-sub { background-color: #f7d6c8; padding: 8px; font-weight: bold; color: #b84116; }

        /* 画像通りのメイン2カラム構造 */
        .content-wrapper {
            display: flex; max-width: 1200px; margin: 0 auto 50px auto;
            border: 1px solid #aaa; background-color: #fff;
        }
        .column { flex: 1; min-height: 450px; display: flex; flex-direction: column; }
        .column:first-child { border-right: 1px solid #aaa; }
        
        /* カラム見出し（グレー背景・太字・レタースペース） */
        .column-title {
            background-color: #ccc; padding: 12px; text-align: center;
            font-size: 18px; font-weight: bold; letter-spacing: 0.3em;
            border-bottom: 1px solid #aaa;
        }
        .list-container { padding: 20px; flex: 1; }
        .scrollable-list { max-height: 450px; overflow-y: auto; }

        /* 小説アイテム（画像のデザインに極力近く調整） */
        .novel-item {
            margin-bottom: 15px; padding: 10px; border: 1px solid #ddd;
            background-color: #fafafa; border-radius: 4px;
            display: flex; flex-direction: column; gap: 5px;
        }
        .novel-header-line { display: flex; justify-content: space-between; align-items: center; }
        .novel-title-link {
            color: #0066cc; text-decoration: underline; font-weight: bold; font-size: 18px; cursor: pointer;
        }
        .novel-title-link:hover { color: #004499; }
        
        .novel-meta-info { font-size: 13px; color: #555; text-align: right; line-height: 1.4; }
        .novel-desc { font-size: 14px; color: #666; margin-top: 5px; line-height: 1.4; }

        /* 王冠・順位バッジ */
        .rank-badge { color: #ffaa00; font-weight: bold; margin-right: 5px; font-size: 18px; }

        /* 【改善】しっかりとした登録UI（バッジ風デザイン） */
        .status-badge {
            display: inline-block; padding: 3px 8px; font-size: 12px; border-radius: 3px;
            border: 1px solid #ccc; background-color: #f0f0f0; color: #666; cursor: pointer;
            user-select: none; transition: all 0.2s;
        }
        .status-badge.is-fav {
            background-color: #e6f4ea; color: #137333; border-color: #a3dab8; font-weight: bold;
        }
        .status-badge:hover { opacity: 0.8; }

        /* 検索結果の件数アナウンス */
        .search-summary {
            font-size: 15px; color: #666; margin-bottom: 15px; padding-bottom: 5px;
            border-bottom: 2px solid #ff8e8e; font-weight: bold;
        }

        /* 本文表示用のコンテナ（明朝体スタイル） */
        .novel-content-viewer {
            display: flex; flex-direction: column; gap: 15px;
        }
        .viewer-top-meta {
            display: flex; justify-content: space-between; align-items: flex-start;
            border-bottom: 1px solid #eee; padding-bottom: 10px;
        }
        .viewer-back-btn {
            padding: 4px 8px; font-size: 12px; background-color: #eee;
            border: 1px solid #ccc; border-radius: 3px; cursor: pointer;
        }
        .viewer-main-text {
            font-family: 'Shippori Mincho', 'YuMincho', '游明朝', 'MS Mincho', Georgia, serif;
            font-size: 18px; line-height: 2.3; letter-spacing: 0.05em;
            white-space: pre-wrap; word-wrap: break-word; color: #222;
            padding-top: 10px; max-height: 400px; overflow-y: auto; /* 長文はスクロールで読めるように */
        }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="resetToHome()">S<span>tory</span> B<span>ase</span> <span style="font-size: 14px; color:#333; font-weight:normal;">〜 祝！WEB開設 〜</span></div>
        <div class="search-area">
            <div class="search-input-wrapper">
                <input type="text" id="search-input" placeholder="作品名・作者名で検索">
                <button id="clear-btn" class="clear-btn">×</button>
            </div>
            <button id="search-btn">検索</button>
            <select id="sort-select" class="select-sort">
                <option value="none">並び替え：なし</option>
                <option value="new">新着順</option>
                <option value="old">古い順</option>
            </select>
        </div>
    </header>

    <div class="news-bar">
        お知らせ：タロウが作った小説WEBサイト、Story Baseを開設しました！オリジナルの小説作品を応募しています！
    </div>

    <div class="carousel-container">
        <div class="side-box"></div>
        <div class="arrow">←</div>
        <div class="main-banner">
            <div class="banner-title"><span class="logo" onclick="resetToHome()">S<span>tory</span> B<span>ase</span></span> 開設しました！</div>
            <div class="banner-sub">オリジナル小説募集中！</div>
        </div>
        <div class="arrow">→</div>
        <div class="side-box"></div>
    </div>

    <div class="content-wrapper">
        <div class="column">
            <div class="column-title" id="left-column-header">新 着 順</div>
            <div class="list-container" id="left-column-content">
                </div>
        </div>

        <div class="column">
            <div class="column-title">登 録 し た 小 説</div>
            <div class="list-container scrollable-list" id="registered-list">
                </div>
        </div>
    </div>

    <script src="Shosetsu.js"></script>
    <script>
        // お気に入り登録された作品のID配列
        let favoriteIds = [];

        window.addEventListener('DOMContentLoaded', () => {
            // 初期トップ画面の描画
            renderHomeRecentList();
            renderRightFavoriteList();

            // 検索・ソートのイベント登録
            document.getElementById('search-btn').addEventListener('click', handleSearchAndSort);
            document.getElementById('search-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleSearchAndSort();
            });
            document.getElementById('sort-select').addEventListener('change', handleSearchAndSort);

            // クリアボタン（×）の制御
            const searchInput = document.getElementById('search-input');
            const clearBtn = document.getElementById('clear-btn');

            searchInput.addEventListener('input', () => {
                clearBtn.style.display = searchInput.value.length > 0 ? 'block' : 'none';
            });
            clearBtn.addEventListener('click', () => {
                searchInput.value = '';
                clearBtn.style.display = 'none';
                searchInput.focus();
                resetToHome();
            });
        });

        // 完全なホーム状態（初期状態）に戻す
        function resetToHome() {
            document.getElementById('search-input').value = '';
            document.getElementById('clear-btn').style.display = 'none';
            document.getElementById('sort-select').value = 'none';
            renderHomeRecentList();
            renderRightFavoriteList();
        }

        // 1. デフォルトの【新着順】を描画（左カラム）
        function renderHomeRecentList() {
            document.getElementById('left-column-header').innerText = "新 着 順";
            const container = document.getElementById('left-column-content');
            container.innerHTML = '';

            // 日付の新しい順にソート
            const sorted = [...novelData].sort((a, b) => new Date(b.date) - new Date(a.date));

            sorted.forEach((novel, index) => {
                const isFav = favoriteIds.includes(novel.id);
                const badgeClass = isFav ? "status-badge is-fav" : "status-badge";
                const badgeText = isFav ? "登録済み" : "未登録";
                
                const crown = index === 0 ? "👑 " : "";

                const html = `
                    <div class="novel-item">
                        <div class="novel-header-line">
                            <div>
                                <span class="rank-badge">${crown}${index + 1}</span>
                                <span class="novel-title-link" onclick="openNovelViewer(${novel.id})">${novel.title}</span>
                            </div>
                            <div class="novel-meta-info">
                                ${novel.date}<br>作者：${novel.author}
                            </div>
                        </div>
                        <p class="novel-desc">${novel.description}</p>
                        <div>
                            <span class="${badgeClass}" onclick="toggleFavorite(${novel.id}, 'home')">${badgeText}</span>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        // 2. 【検索結果】を描画（左カラムを画像1のレイアウトに差し替え）
        function handleSearchAndSort() {
            const keyword = document.getElementById('search-input').value.trim().toLowerCase();
            const sortVal = document.getElementById('sort-select').value;

            if (keyword === "") {
                renderHomeRecentList();
                return;
            }

            document.getElementById('left-column-header').innerText = "検 索 結 果";
            const container = document.getElementById('left-column-content');
            container.innerHTML = '';

            // スコアリング処理（完全一致を最上位にするため）
            let filteredList = [];
            novelData.forEach(novel => {
                const titleLower = novel.title.toLowerCase();
                const authorLower = novel.author.toLowerCase();
                let score = 0;

                if (titleLower === keyword || authorLower === keyword) {
                    score = 100; // 完全一致
                } else if (titleLower.includes(keyword) || authorLower.includes(keyword)) {
                    score = 10;  // 部分一致
                }

                if (score > 0) {
                    filteredList.push({ ...novel, _score: score });
                }
            });

            // ソートアルゴリズム適用（適合スコア最優先、次点で日付条件）
            filteredList.sort((a, b) => {
                if (a._score !== b._score) return b._score - a._score;
                if (sortVal === "new") return new Date(b.date) - new Date(a.date);
                if (sortVal === "old") return new Date(a.date) - new Date(b.date);
                return 0;
            });

            // 検索結果件数の見出しを追加
            container.insertAdjacentHTML('beforeend', `
                <div class="search-summary">「 ${document.getElementById('search-input').value} 」の結果（${filteredList.length}件）</div>
            `);

            if (filteredList.length === 0) {
                container.insertAdjacentHTML('beforeend', '<p style="color:#999; text-align:center; padding:20px;">該当する作品が見つかりませんでした。</p>');
                return;
            }

            // 画像1のレイアウト構造を忠実に再現
            filteredList.forEach(novel => {
                const isFav = favoriteIds.includes(novel.id);
                const badgeClass = isFav ? "status-badge is-fav" : "status-badge";
                const badgeText = isFav ? "登録済み" : "未登録";

                const dateObj = new Date(novel.date);
                const formattedDate = `${dateObj.getFullYear()}年${dateObj.getMonth() + 1}月${dateObj.getDate()}日`;

                const html = `
                    <div class="novel-item">
                        <div class="novel-header-line">
                            <span class="novel-title-link" style="font-size: 20px;" onclick="openNovelViewer(${novel.id})">${novel.title}</span>
                            <div class="novel-meta-info">
                                ${formattedDate}<br>作者：${novel.author}
                            </div>
                            <div>
                                <span class="${badgeClass}" onclick="toggleFavorite(${novel.id}, 'search')">${badgeText}</span>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        // 3. 【本文閲覧】を描画（左カラムを画像2のレイアウトに差し替え）
        function openNovelViewer(id) {
            const novel = novelData.find(n => n.id === id);
            if (!novel) return;

            document.getElementById('left-column-header').innerText = "小 説 閲 読";
            const container = document.getElementById('left-column-content');
            container.innerHTML = '';

            const isFav = favoriteIds.includes(novel.id);
            const badgeClass = isFav ? "status-badge is-fav" : "status-badge";
            const badgeText = isFav ? "登録済み" : "未登録";

            const dateObj = new Date(novel.date);
            const formattedDate = `${dateObj.getFullYear()}年${dateObj.getMonth() + 1}月${dateObj.getDate()}日`;

            // 画像2の構成（左に登録ボタン、中央に大きなタイトル、右にメタ情報、下に明朝体本文）
            const html = `
                <div class="novel-content-viewer">
                    <div class="viewer-top-meta">
                        <div style="display: flex; flex-direction: column; gap: 8px;">
                            <span class="${badgeClass}" id="viewer-fav-badge" onclick="toggleFavorite(${novel.id}, 'viewer')">${badgeText}</span>
                            <button class="viewer-back-btn" onclick="renderHomeRecentList()">一覧に戻る</button>
                        </div>
                        <div style="font-size: 22px; font-weight: bold; text-align: center; flex: 1; padding: 0 10px;">
                            ${novel.title}
                        </div>
                        <div class="novel-meta-info">
                            ${formattedDate}<br>作者：${novel.author}
                        </div>
                    </div>
                    <div class="viewer-main-text">${novel.content}</div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
            
            // 本文の上部へスムーズに位置を合わせる
            document.getElementById('left-column-header').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // 4. 右カラム【登録した小説】の描画と同期
        function renderRightFavoriteList() {
            const container = document.getElementById('registered-list');
            container.innerHTML = '';

            const favNovels = novelData.filter(n => favoriteIds.includes(n.id));

            if (favNovels.length === 0) {
                container.innerHTML = '<p style="color:#aaa; text-align:center; padding:20px;">登録された小説はここに表示されます。</p>';
                return;
            }

            favNovels.forEach((novel, index) => {
                const html = `
                    <div class="novel-item" style="padding: 8px; margin-bottom: 10px;">
                        <div>
                            <span class="rank-badge">${index + 1}</span>
                            <span class="novel-title-link" onclick="openNovelViewer(${novel.id})">${novel.title}</span>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        // お気に入り登録のオン・オフ切り替え（どこから押されても状態を同期）
        function toggleFavorite(id, fromContext) {
            const index = favoriteIds.indexOf(id);
            if (index === -1) {
                favoriteIds.push(id);
            } else {
                favoriteIds.splice(index, 1);
            }

            // 右側の「登録した小説」リストを即時更新
            renderRightFavoriteList();

            // 現在どの画面を表示しているかに応じて、左カラムの表示状態だけをスマートに維持・部分更新
            if (fromContext === 'home') {
                renderHomeRecentList();
            } else if (fromContext === 'search') {
                handleSearchAndSort();
            } else if (fromContext === 'viewer') {
                // 閲覧画面内のバッジだけを滑らかに書き換える（ページがブレないようにするため）
                const badge = document.getElementById('viewer-fav-badge');
                const isFav = favoriteIds.includes(id);
                if (isFav) {
                    badge.innerText = "登録済み";
                    badge.className = "status-badge is-fav";
                } else {
                    badge.innerText = "未登録";
                    badge.className = "status-badge";
                }
            }
        }
    </script>
</body>
</html>
