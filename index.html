<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Base 〜 祝！WEB開設 〜</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            background-color: #f9f9f9;
            color: #333;
        }

        /* ヘッダー：常に最上部に固定（検索窓あり） */
        header {
            background-color: #ff8e8e;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo { font-size: 24px; font-weight: bold; color: #0d2c54; cursor: pointer; }
        .logo span { color: #2a7b4c; }
        
        /* 検索窓（クリアボタン「×」付き） */
        .search-area { display: flex; gap: 8px; align-items: center; }
        .search-input-wrapper { position: relative; display: inline-block; }
        .search-input-wrapper input {
            padding: 6px 30px 6px 12px;
            width: 250px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .clear-btn {
            position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
            border: none; background: none; color: #999; font-size: 16px; cursor: pointer; display: none;
        }
        .clear-btn:hover { color: #333; }

        .search-area button {
            padding: 6px 12px; background-color: #fff; border: 1px solid #999;
            border-radius: 4px; cursor: pointer; font-size: 14px;
        }

        /* お知らせバー */
        .news-bar {
            background-color: #ffe4e4; padding: 8px; text-align: center;
            font-size: 14px; border-bottom: 1px solid #ffcdcd;
        }

        /* カルーセル（広告バー：デザインを崩さず動くように調整） */
        .carousel-container {
            display: flex; align-items: center; justify-content: center;
            margin: 25px auto; max-width: 1000px; gap: 20px; padding: 0 20px;
        }
        .arrow { font-size: 30px; cursor: pointer; user-select: none; padding: 10px; }
        .side-box { 
            width: 80px; height: 120px; border: 1px solid #ccc; background-color: #fff; opacity: 0.4; 
            display: flex; align-items: center; justify-content: center; font-size: 11px; color: #666; text-align: center; padding: 5px;
        }
        .main-banner {
            flex: 1; border: 2px solid #333; background-color: #fff; text-align: center; padding: 25px 20px;
        }
        .banner-title { font-size: 26px; margin-bottom: 10px; }
        .banner-sub { background-color: #f7d6c8; padding: 8px; font-weight: bold; color: #b84116; }

        /* 全体コンテナ */
        .page-section {
            max-width: 1200px;
            margin: 0 auto 50px auto;
            padding: 0 20px;
        }

        /* 【ホーム用】2カラムレイアウト */
        .default-layout {
            display: flex; border: 1px solid #aaa; background-color: #fff;
        }
        .column { flex: 1; min-height: 450px; display: flex; flex-direction: column; }
        .column:first-child { border-right: 1px solid #aaa; }
        
        .column-title {
            background-color: #ccc; padding: 12px; text-align: center;
            font-size: 18px; font-weight: bold; letter-spacing: 0.3em;
            border-bottom: 1px solid #aaa;
        }
        .list-container { padding: 20px; flex: 1; }
        .scrollable-list { max-height: 450px; overflow-y: auto; }

        /* 小説アイテム（ホーム共通） */
        .novel-item {
            margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px dashed #eee;
        }
        .novel-title-link {
            color: #0066cc; text-decoration: none; font-weight: bold; font-size: 18px; cursor: pointer;
        }
        .novel-title-link:hover { text-decoration: underline; }
        .rank-badge { color: #ffaa00; font-weight: bold; margin-right: 5px; font-size: 18px; }

        /* 【画面1：検索結果】専用スタイル */
        .search-result-title-text {
            text-align: center; font-size: 20px; color: #555; margin: 30px 0 20px 0;
        }
        .search-result-box {
            border: 1px solid #333; background-color: #ccc;
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 25px; width: 100%; max-width: 900px; margin: 0 auto 15px auto;
        }
        .result-main { display: flex; align-items: baseline; gap: 40px; }
        .result-title { font-size: 22px; font-weight: bold; color: #0066cc; cursor: pointer; text-decoration: underline; }
        .result-meta { font-size: 14px; color: #333; line-height: 1.5; }
        .result-fav-status { font-size: 14px; color: #333; text-align: right; font-weight: bold; }

        /* しっかりとした登録UI（未登録・登録済みバッジ） */
        .status-badge {
            display: inline-block; padding: 4px 10px; font-size: 13px; border-radius: 4px;
            border: 1px solid #aaa; background-color: #f5f5f5; color: #444; cursor: pointer;
            user-select: none; transition: all 0.2s; text-align: center;
        }
        .status-badge.is-fav {
            background-color: #e6f4ea; color: #137333; border-color: #a3dab8; font-weight: bold;
        }

        /* 【画面2：本文閲覧】専用スタイル */
        .viewer-container {
            max-width: 900px; margin: 40px auto; background-color: #fff;
            padding: 40px; border: 1px solid #ddd; border-radius: 4px;
        }
        .viewer-header {
            display: flex; justify-content: space-between; align-items: flex-start;
            border-bottom: 2px solid #ff8e8e; padding-bottom: 20px; margin-bottom: 30px;
        }
        .viewer-left { display: flex; flex-direction: column; gap: 12px; }
        .viewer-back-btn {
            padding: 4px 8px; font-size: 12px; background-color: #eee;
            border: 1px solid #ccc; border-radius: 3px; cursor: pointer; width: fit-content;
        }
        .viewer-center-title { font-size: 32px; font-weight: bold; text-align: center; flex: 1; padding: 0 20px; }
        .viewer-right-meta { text-align: right; font-size: 14px; color: #444; line-height: 1.6; }
        
        /* 明朝体の本文を表示 */
        .viewer-body-text {
            font-family: 'Shippori Mincho', 'YuMincho', '游明朝', 'MS Mincho', Georgia, serif;
            font-size: 22px; line-height: 2.5; letter-spacing: 0.06em;
            white-space: pre-wrap; word-wrap: break-word; color: #111;
            padding: 20px 10px 80px 10px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="showDefaultPage()">S<span>tory</span> B<span>ase</span> <span style="font-size: 14px; color:#333; font-weight:normal;">〜 祝！WEB開設 〜</span></div>
        <div class="search-area">
            <div class="search-input-wrapper">
                <input type="text" id="search-input" placeholder="作品名・作者名で検索">
                <button id="clear-btn" class="clear-btn">×</button>
            </div>
            <button id="search-btn">検索</button>
        </div>
    </header>

    <div class="news-bar" id="news-bar">
        お知らせ：タロウが作った小説WEBサイト、Story Baseを開設しました！オリジナルの小説作品を応募しています！
    </div>

    <div class="carousel-container" id="carousel-area">
        <div class="arrow" onclick="moveCarousel(-1)">←</div>
        <div class="side-box" id="carousel-left-box"></div>
        <div class="main-banner">
            <div class="banner-title" id="carousel-title"></div>
            <div class="banner-sub" id="carousel-sub"></div>
        </div>
        <div class="side-box" id="carousel-right-box"></div>
        <div class="arrow" onclick="moveCarousel(1)">→</div>
    </div>

    <div id="section-default" class="page-section">
        <div class="default-layout">
            <div class="column">
                <div class="column-title">新 着 順</div>
                <div class="list-container" id="recent-list"></div>
            </div>
            <div class="column">
                <div class="column-title">登 録 し た 小 説</div>
                <div class="list-container scrollable-list" id="registered-list"></div>
            </div>
        </div>
    </div>

    <div id="section-search-result" class="page-section" style="display: none;">
        <div class="search-result-title-text" id="search-result-title-text"></div>
        <div id="search-results-container"></div>
    </div>

    <div id="section-viewer" class="page-section" style="display: none;">
        <div class="viewer-container">
            <div class="viewer-header">
                <div class="viewer-left">
                    <span class="status-badge" id="v-fav-badge" onclick="toggleFavoriteFromViewer()">未登録</span>
                    <button class="viewer-back-btn" onclick="showDefaultPage()">一覧へ戻る</button>
                </div>
                <div class="viewer-center-title" id="v-title">作品タイトル</div>
                <div class="viewer-right-meta">
                    <div id="v-date">2026年7月7日</div>
                    <div id="v-author">作者：タロウ</div>
                </div>
            </div>
            <div class="viewer-body-text" id="v-content">
                本文がここに表示されます。
            </div>
        </div>
    </div>

    <script src="Shosetsu.js"></script>
    <script>
        // バックアップ用ダミーデータ（外部ファイルがない場合でも動作を担保）
        const fallbackData = [
            { id: 1, title: "絶望の彼方で待つ光", author: "タロウ", date: "2026-07-07", content: "第一章 終わりの始まり\n\n世界がその光を失ってから、どれほどの月日が流れただろうか。\n足元に広がる荒野は冷たく、乾いた風だけが耳を通り抜けていく。" },
            { id: 2, title: "群青色のサイダー", author: "アオイ", date: "2026-07-06", content: "夏の匂いがした。\nすれ違う電車の窓から差し込む陽射しは痛いくらいに眩しい。" }
        ];
        const novelData = (typeof window.novelData !== 'undefined') ? window.novelData : fallbackData;

        let favoriteIds = []; // 登録された小説のIDリスト
        let currentViewingId = null; // 現在読んでいる小説のID

        // カルーセル用データ（左右の予告枠と連動するテキスト）
        const carouselSlides = [
            { title: "Story Base 開設しました！", sub: "オリジナル小説募集中！", left: "広告枠C", right: "広告枠B" },
            { title: "広告枠Bの内容です", sub: "ここにサブテキストB", left: "Story Base 開設", right: "広告枠C" },
            { title: "広告枠Cの内容です", sub: "ここにサブテキストC", left: "広告枠B", right: "Story Base 開設" }
        ];
        let currentSlideIndex = 0;

        window.addEventListener('DOMContentLoaded', () => {
            // 初期画面とカルーセルの描画を実行（これで白飛びを防ぎます）
            showDefaultPage();
            updateCarousel();

            // 検索イベント
            document.getElementById('search-btn').addEventListener('click', executeSearch);
            document.getElementById('search-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') executeSearch();
            });

            // クリア（×）ボタン
            const searchInput = document.getElementById('search-input');
            const clearBtn = document.getElementById('clear-btn');
            searchInput.addEventListener('input', () => {
                clearBtn.style.display = searchInput.value.length > 0 ? 'block' : 'none';
            });
            clearBtn.addEventListener('click', () => {
                searchInput.value = '';
                clearBtn.style.display = 'none';
                showDefaultPage();
            });
        });

        // ホーム画面へのリセット
        function showDefaultPage() {
            document.getElementById('news-bar').style.display = 'block';
            document.getElementById('carousel-area').style.display = 'flex';
            document.getElementById('section-default').style.display = 'block';
            document.getElementById('section-search-result').style.display = 'none';
            document.getElementById('section-viewer').style.display = 'none';
            
            currentViewingId = null;

            renderHomeRecentList();
            renderRightFavoriteList();
        }

        // カルーセルの中身を入れ替える処理
        function updateCarousel() {
            const slide = carouselSlides[currentSlideIndex];
            document.getElementById('carousel-title').innerHTML = slide.title === "Story Base 開設しました！" 
                ? `<span class="logo" onclick="showDefaultPage()">S<span>tory</span> B<span>ase</span></span> 開設しました！`
                : slide.title;
            document.getElementById('carousel-sub').innerText = slide.sub;
            document.getElementById('carousel-left-box').innerText = slide.left;
            document.getElementById('carousel-right-box').innerText = slide.right;
        }

        // 矢印クリックでスライド変更
        function moveCarousel(dir) {
            currentSlideIndex = (currentSlideIndex + dir + carouselSlides.length) % carouselSlides.length;
            updateCarousel();
        }

        // ホーム左：新着順
        function renderHomeRecentList() {
            const container = document.getElementById('recent-list');
            container.innerHTML = '';
            const sorted = [...novelData].sort((a, b) => new Date(b.date) - new Date(a.date));
            
            sorted.forEach((novel, index) => {
                const crown = index === 0 ? "👑 " : "";
                container.insertAdjacentHTML('beforeend', `
                    <div class="novel-item">
                        <span class="rank-badge">${crown}${index + 1}</span>
                        <span class="novel-title-link" onclick="openViewer(${novel.id})">${novel.title}</span>
                    </div>
                `);
            });
        }

        // ホーム右：登録した小説
        function renderRightFavoriteList() {
            const container = document.getElementById('registered-list');
            container.innerHTML = '';
            const favNovels = novelData.filter(n => favoriteIds.includes(n.id));

            if (favNovels.length === 0) {
                container.innerHTML = '<p style="color:#aaa; text-align:center; padding:20px;">登録された小説はここに表示されます。</p>';
                return;
            }

            favNovels.forEach((novel, index) => {
                container.insertAdjacentHTML('beforeend', `
                    <div class="novel-item">
                        <span class="rank-badge">${index + 1}</span>
                        <span class="novel-title-link" onclick="openViewer(${novel.id})">${novel.title}</span>
                    </div>
                `);
            });
        }

        // 検索ロジック（ソート機能は除外）
        function executeSearch() {
            const keyword = document.getElementById('search-input').value.trim().toLowerCase();

            if (keyword === "") {
                showDefaultPage();
                return;
            }

            document.getElementById('news-bar').style.display = 'none';
            document.getElementById('carousel-area').style.display = 'none';
            document.getElementById('section-default').style.display = 'none';
            document.getElementById('section-search-result').style.display = 'block';
            document.getElementById('section-viewer').style.display = 'none';

            let filteredList = [];
            novelData.forEach(novel => {
                const titleLower = novel.title.toLowerCase();
                const authorLower = novel.author.toLowerCase();
                let score = 0;

                if (titleLower === keyword || authorLower === keyword) {
                    score = 100;
                } else if (titleLower.includes(keyword) || authorLower.includes(keyword)) {
                    score = 10;
                }

                if (score > 0) {
                    filteredList.push({ ...novel, _score: score });
                }
            });

            filteredList.sort((a, b) => b._score - a._score);

            document.getElementById('search-result-title-text').innerText = `「 ${document.getElementById('search-input').value} 」の結果（${filteredList.length}件）`;

            const resultsContainer = document.getElementById('search-results-container');
            resultsContainer.innerHTML = '';

            if (filteredList.length === 0) {
                resultsContainer.innerHTML = '<p style="text-align:center; color:#999; padding:40px;">該当する作品がありませんでした。</p>';
                return;
            }

            filteredList.forEach(novel => {
                const isFav = favoriteIds.includes(novel.id);
                const favStatusText = isFav ? "登録済み" : "未登録";
                const dateObj = new Date(novel.date);
                const formattedDate = `${dateObj.getFullYear()}年${dateObj.getMonth() + 1}月${dateObj.getDate()}日`;

                const html = `
                    <div class="search-result-box">
                        <div class="result-main">
                            <div class="result-title" onclick="openViewer(${novel.id})">${novel.title}</div>
                            <div class="result-meta">
                                ${formattedDate}<br>
                                作者：${novel.author}
                            </div>
                        </div>
                        <div class="result-fav-status">
                            <span class="status-badge ${isFav ? 'is-fav' : ''}" onclick="toggleFavoriteInline(${novel.id}, this)">${favStatusText}</span>
                        </div>
                    </div>
                `;
                resultsContainer.insertAdjacentHTML('beforeend', html);
            });
        }

        // 検索結果からの直接登録UI
        function toggleFavoriteInline(id, element) {
            const index = favoriteIds.indexOf(id);
            if (index === -1) {
                favoriteIds.push(id);
                element.innerText = "登録済み";
                element.classList.add('is-fav');
            } else {
                favoriteIds.splice(index, 1);
                element.innerText = "未登録";
                element.classList.remove('is-fav');
            }
            renderRightFavoriteList();
        }

        // 本文閲覧
        function openViewer(id) {
            const novel = novelData.find(n => n.id === id);
            if (!novel) return;

            currentViewingId = id;

            document.getElementById('news-bar').style.display = 'none';
            document.getElementById('carousel-area').style.display = 'none';
            document.getElementById('section-default').style.display = 'none';
            document.getElementById('section-search-result').style.display = 'none';
            document.getElementById('section-viewer').style.display = 'block';

            document.getElementById('v-title').innerText = novel.title;
            document.getElementById('v-author').innerText = `作者：${novel.author}`;
            
            const dateObj = new Date(novel.date);
            document.getElementById('v-date').innerText = `${dateObj.getFullYear()}年${dateObj.getMonth() + 1}月${dateObj.getDate()}日`;
            document.getElementById('v-content').innerText = novel.content;

            updateViewerFavBadge();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateViewerFavBadge() {
            const badge = document.getElementById('v-fav-badge');
            if (favoriteIds.includes(currentViewingId)) {
                badge.innerText = "登録済み";
                badge.className = "status-badge is-fav";
            } else {
                badge.innerText = "未登録";
                badge.className = "status-badge";
            }
        }

        function toggleFavoriteFromViewer() {
            if (!currentViewingId) return;

            const index = favoriteIds.indexOf(currentViewingId);
            if (index === -1) {
                favoriteIds.push(currentViewingId);
            } else {
                favoriteIds.splice(index, 1);
            }

            updateViewerFavBadge();
            renderRightFavoriteList();
        }
    </script>
</body>
</html>
